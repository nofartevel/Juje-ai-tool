<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JUJE Saved List</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="app-shell">
    <div class="app-card">

        <div class="top-bar">
            <div class="brand">
                <img src="/logo.png" alt="JUJE logo"
                     onerror="this.style.display='none'; document.getElementById('fallbackBrand').style.display='block';" />
                <div id="fallbackBrand" class="brand-text" style="display:none;">JUJE</div>
            </div>
        </div>

        <div class="screen" id="content">
            Loading saved list...
        </div>

    </div>
</div>

<script>
    async function loadList() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const content = document.getElementById("content");

        if (!id) {
            content.innerHTML = `
                <div class="empty-state">
                    Missing list id
                </div>
            `;
            return;
        }

        try {
            const response = await fetch(`/list/${id}`);
            const data = await response.json();

            if (!data || !data.products) {
                content.innerHTML = `
                    <div class="empty-state">
                        List not found
                    </div>
                `;
                return;
            }

            const productsHtml = (data.products || []).map(product => `
                <div class="product-item">

                    <div class="product-left">
                        <div class="check-icon">✔</div>
                    </div>

                    <div class="product-content">
                        <div class="product-title">${product.name}</div>
                        <div class="product-why">${product.why}</div>

                        <a class="product-link" href="${product.link}" target="_blank">
                            View product →
                        </a>
                    </div>

                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" />
                    </div>

                </div>
            `).join("");

            content.innerHTML = `
                <div class="results-header">
                    <h2 class="results-title">
                        Your JUJE list ✨
                    </h2>

                    <p class="results-subtitle">
                        Created for: <strong>${data.input || "custom request"}</strong>
                    </p>
                </div>

                ${productsHtml || `
                    <div class="empty-state">
                        No saved products yet
                    </div>
                `}
            `;

        } catch (error) {
            console.error(error);
            content.innerHTML = `
                <div class="empty-state">
                    Something went wrong while loading the list
                </div>
            `;
        }
    }

    loadList();
</script>

</body>
</html>
