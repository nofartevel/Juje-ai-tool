<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JUJE - Your Travel Plan</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="/analytics.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="app-shell">
    <div class="app-card">

        <div class="top-bar">
            <div class="brand">
                <img src="/logo.png" alt="JUJE logo"
                     onerror="this.style.display='none'; document.getElementById('fallbackBrand').style.display='block';" />
                <div id="fallbackBrand" class="brand-text" style="display:none;">JUJE</div>
            </div>
        </div>

        <div class="screen" id="content">
            Loading your travel plan...
        </div>

    </div>
</div>

<script>
    let currentPlanData = null;

    async function loadPlan() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const content = document.getElementById("content");

        if (!id) {
            content.innerHTML = `<div class="hero"><h1 class="hero-title">Missing plan id</h1></div>`;
            return;
        }

        try {
            const response = await fetch(`/api/v1/plan/${id}`);
            currentPlanData = await response.json();
            const currentPlan = currentPlanData;

            if (!currentPlan) {
                content.innerHTML = `<div class="hero"><h1 class="hero-title">Plan not found</h1></div>`;
                return;
            }

            // Populate printable checklist
            const printableChecklist = document.getElementById('printableChecklist');
            if (printableChecklist) {
                printableChecklist.innerHTML = `
                    <div style="text-align: center; margin-bottom: 20px;">
                        <img src="/logo.png" alt="JUJE logo" style="height: 50px; margin-bottom: 10px;">
                        <div style="font-size: 14px; color: #666; font-weight: 700;">
                            Family Travel Plan • Checklist
                        </div>
                    </div>
                    <h1 style="text-align: center; margin-bottom: 30px;">Packing Checklist</h1>
                    ${currentPlan.packingChecklist.map(cat => `
                        <div style="margin-bottom: 25px;">
                            <h2 style="border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; font-size: 18px;">${cat.categoryName}</h2>
                            <ul style="list-style: none; padding: 0; margin: 0;">
                                ${(cat.items || []).map(item => `
                                    <li style="margin-bottom: 10px; display: flex; align-items: flex-start; font-size: 14px;">
                                        <div style="width: 18px; height: 18px; border: 1px solid #333; margin-right: 12px; flex-shrink: 0; border-radius: 3px;"></div>
                                        <span>${item}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    `).join('')}
                `;
            }

            const categorizedProducts = {};
            if (currentPlan.recommendedProducts) {
                currentPlan.recommendedProducts.forEach(p => {
                    const cat = p.category || 'OTHER';
                    if (!categorizedProducts[cat]) categorizedProducts[cat] = [];
                    categorizedProducts[cat].push(p);
                });
            }

            const categoryIcons = {
                'SLEEP': '🌙',
                'EAT': '🍴',
                'PLAY': '🧸',
                'SAFETY': '🛡️',
                'HYGIENE': '🧼',
                'GEAR': '🎒',
                'CLOTHING': '👕',
                'HEALTH': '💊',
                'OTHER': '⭐'
            };

            const categoryNames = {
                'SLEEP': 'Sleep',
                'EAT': 'Eating',
                'PLAY': 'Play & Entertainment',
                'SAFETY': 'Safety',
                'HYGIENE': 'Hygiene',
                'GEAR': 'Essential Gear',
                'CLOTHING': 'Clothing',
                'HEALTH': 'Health & First Aid',
                'OTHER': 'Other'
            };

            content.innerHTML = `
                <div class="result-container" style="animation: fadeInUp 0.5s ease;">
                    <!-- Summary Header -->
                    <div class="summary-header">
                        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                            <div style="font-size: 40px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));">🎒</div>
                            <div>
                                <h3>Shared Travel Plan</h3>
                                <div style="font-size: 14px; color: var(--muted); font-weight: 700;">
                                    Curated for your family
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="result-dashboard">
                        <!-- 1. Packing Checklist (Open by default) -->
                        <div class="section-collapsible">
                            <div class="section-header" onclick="toggleSection('checklist-content', 'checklist-icon')">
                                <div>
                                    <h3><span>📦</span> What To Pack</h3>
                                    <div class="section-header-desc">Essential items for your family trip</div>
                                </div>
                                <span id="checklist-icon" style="color: var(--primary); font-size: 12px;">▲</span>
                            </div>
                            <div id="checklist-content" class="section-content" style="display: block;">
                                <div class="accordion">
                                    ${currentPlan.packingChecklist.map((cat, i) => `
                                        <div class="category-collapsible">
                                            <div class="category-header" onclick="toggleAccordion(${i})">
                                                <div class="category-header-info">
                                                    <div class="category-header-title">${cat.categoryName}</div>
                                                    <div class="category-preview">${(cat.items || []).slice(0, 3).join(', ')}...</div>
                                                </div>
                                                <span id="acc-icon-${i}" style="color: var(--primary); font-size: 12px;">▼</span>
                                            </div>
                                            <div id="acc-content-${i}" class="category-content" style="display: none; padding: 20px 24px;">
                                                <ul style="list-style: none; padding: 0; margin: 0;">
                                                    ${(cat.items || []).map(item => `<li style="margin-bottom: 12px; display: flex; align-items: flex-start; font-size: 14px; line-height: 1.4;"><input type="checkbox" style="margin-right: 12px; margin-top: 3px; accent-color: var(--primary); width: 18px; height: 18px; flex-shrink: 0;"> <span>${item}</span></li>`).join('')}
                                                </ul>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- 2. Products / Gear -->
                        <div class="section-collapsible">
                            <div class="section-header" onclick="toggleSection('gear-content', 'gear-icon')">
                                <div>
                                    <h3><span>🛒</span> Recommended Gear</h3>
                                    <div class="section-header-desc">Curated gear for your specific needs</div>
                                </div>
                                <span id="gear-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                            </div>
                            <div id="gear-content" class="section-content" style="display: none;">
                                ${Object.keys(categorizedProducts).length > 0 ? Object.keys(categorizedProducts).map((catKey, idx) => `
                                    <div class="category-collapsible">
                                        <div class="category-header" onclick="toggleSection('prod-cat-${idx}', 'prod-cat-icon-${idx}')">
                                            <div class="category-header-info">
                                                <div class="category-header-title">${categoryIcons[catKey.toUpperCase()] || '⭐'} ${categoryNames[catKey.toUpperCase()] || catKey}</div>
                                                <div class="category-preview">${categorizedProducts[catKey].slice(0, 2).map(p => p.name).join(', ')}...</div>
                                            </div>
                                            <span id="prod-cat-icon-${idx}" style="font-size: 10px;">▼</span>
                                        </div>
                                        <div id="prod-cat-${idx}" class="category-content" style="display: none;">
                                            ${categorizedProducts[catKey].map(p => {
                                                return `
                                                    <a href="${p.link}" target="_blank" class="product-row" onclick="JujeAnalytics.trackProductClick('${p.id}', '${p.name.replace(/'/g, "\\'")}');">
                                                        <img src="${p.image}" onerror="this.src='/logo.png'" class="product-row-thumb">
                                                        <div class="product-row-info">
                                                            <h5 class="product-row-name">${p.name}</h5>
                                                            <p class="product-row-desc">${p.why || ''}</p>
                                                            <div class="product-row-cta">
                                                                See Product →
                                                            </div>
                                                        </div>
                                                    </a>
                                                `;
                                            }).join('')}
                                        </div>
                                    </div>
                                `).join('') : `
                                    <div style="text-align: center; padding: 40px 20px; color: var(--muted);">
                                        <p>No products recommended for this plan.</p>
                                    </div>
                                `}
                            </div>
                        </div>

                        <!-- 3. Travel Tips -->
                        <div class="section-collapsible">
                            <div class="section-header" onclick="toggleSection('tips-content', 'tips-icon')">
                                <div>
                                    <h3><span>💡</span> Parent Tips</h3>
                                    <div class="section-header-desc">Age-appropriate travel wisdom</div>
                                </div>
                                <span id="tips-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                            </div>
                            <div id="tips-content" class="section-content" style="display: none;">
                                <div class="tips-grid" style="display: grid; grid-template-columns: 1fr; gap: 16px;">
                                    ${currentPlan.travelTips.map(tip => `
                                        <div style="background: var(--white); padding: 20px; border-radius: var(--radius-md); border-left: 6px solid var(--primary); box-shadow: var(--shadow-soft); line-height: 1.6; font-size: 15px; color: var(--text);">
                                            ${tip}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- 4. Don't Forget These -->
                        <div class="section-collapsible">
                            <div class="section-header" onclick="toggleSection('reminders-content', 'reminders-icon')">
                                <div>
                                    <h3><span>⚠️</span> Don't Forget These</h3>
                                    <div class="section-header-desc">Critical reminders for a smooth trip</div>
                                </div>
                                <span id="reminders-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                            </div>
                            <div id="reminders-content" class="section-content" style="display: none;">
                                <ul style="list-style: none; padding: 0; margin: 0;">
                                    ${currentPlan.forgottenItems.map(item => `<li style="margin-bottom: 16px; display: flex; align-items: flex-start; line-height: 1.5; background: var(--white); padding: 14px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border); box-shadow: var(--shadow-soft); color: var(--text);">
                                        <span style="color: #d9534f; margin-right: 12px; font-size: 18px; line-height: 1;">⚠️</span>
                                        <span style="font-size: 15px; font-weight: 600;">${item}</span>
                                    </li>`).join('')}
                                </ul>
                            </div>
                        </div>

                        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 32px;">
                            <button class="btn btn-secondary" style="flex: 1; min-width: auto;" onclick="generatePDF()">Print Checklist</button>
                            <a href="index.html" class="btn btn-primary" style="flex: 2; min-width: auto; display: flex; align-items: center; justify-content: center; text-decoration: none;">Create My Own Plan ✨</a>
                        </div>
                    </div>
                </div>
            `;

        } catch (error) {
            console.error(error);
            content.innerHTML = `<div class="hero"><h1 class="hero-title">Error loading plan</h1></div>`;
        }
    }

    loadPlan();

    async function generatePDF() {
        JujeAnalytics.trackPrintClick();
        if (!currentPlanData || !currentPlanData.packingChecklist) {
            console.error('[DEBUG_LOG] No current plan data available');
            alert('No packing checklist data found.');
            return;
        }

        const checklist = currentPlanData.packingChecklist;
        const context = currentPlanData.context || {};

        console.log('[DEBUG_LOG] TravelPlan found: true');
        console.log('[DEBUG_LOG] tripType:', context.tripType);
        console.log('[DEBUG_LOG] children:', context.children ? context.children.length : 0);
        console.log('[DEBUG_LOG] durationDays:', context.durationDays);
        console.log('[DEBUG_LOG] weather:', context.weather);
        console.log('[DEBUG_LOG] packingChecklist size:', checklist.length);

        checklist.forEach(cat => {
            console.log(`[DEBUG_LOG] ${cat.categoryName}: ${cat.items ? cat.items.length : 0} items`);
        });

        if (checklist.length === 0 || checklist.every(cat => !cat.items || cat.items.length === 0)) {
            alert('The checklist is empty. Nothing to print.');
            return;
        }

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();

            // 1. JUJE Logo
            doc.setFontSize(24);
            doc.setTextColor(255, 107, 107);
            doc.setFont("helvetica", "bold");
            doc.text("JUJE", pageWidth / 2, 20, { align: "center" });

            // 2. Trip Summary
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.setFont("helvetica", "normal");

            const context = currentPlanData.context || {};

            const tripTypeMap = {
                'FLIGHT': 'Flight',
                'ROAD_TRIP': 'Road Trip',
                'BEACH': 'Beach Trip',
                'CRUISE': 'Cruise',
                'CAMPING': 'Camping',
                'GENERAL': 'Travel Plan'
            };

            const tripType = tripTypeMap[context.tripType] || context.tripType || "Travel Plan";
            const childrenCount = context.children ? context.children.length : 0;
            const duration = context.durationDays || 0;
            const weather = context.weather ? (context.weather.charAt(0).toUpperCase() + context.weather.slice(1).toLowerCase()) : "Family Trip";

            const summaryText = `${tripType} • ${childrenCount} ${childrenCount === 1 ? 'child' : 'children'} • ${duration} days • ${weather}`;
            doc.text(summaryText, pageWidth / 2, 30, { align: "center" });

            // 2b. Generation Date
            doc.setFontSize(9);
            doc.setTextColor(150, 150, 150);
            const today = new Date();
            const dateString = `Generated on ${today.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
            doc.text(dateString, pageWidth / 2, 35, { align: "center" });

            // 3. Packing Checklist Title
            doc.setFontSize(18);
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "bold");
            doc.text("Packing Checklist", pageWidth / 2, 48, { align: "center" });

            let startY = 60;

            // 4. Checklist Categories & Items
            checklist.forEach((category, index) => {
                if (!category.items || category.items.length === 0) return;

                if (startY > 250) {
                    doc.addPage();
                    startY = 20;
                }

                doc.setFontSize(14);
                doc.setTextColor(255, 107, 107);
                doc.setFont("helvetica", "bold");
                doc.text(`${index + 1}. ${category.categoryName}`, 14, startY);
                startY += 8;

                const tableData = category.items.map(item => ["", item]);
                
                doc.autoTable({
                    startY: startY,
                    body: tableData,
                    columns: [
                        { header: "", dataKey: 0 },
                        { header: "Item", dataKey: 1 }
                    ],
                    theme: 'plain',
                    styles: { 
                        fontSize: 11, 
                        cellPadding: { top: 3, right: 2, bottom: 3, left: 2 },
                        textColor: [50, 50, 50]
                    },
                    columnStyles: {
                        0: { cellWidth: 12, halign: 'center' },
                        1: { cellWidth: 'auto' }
                    },
                    didDrawCell: (data) => {
                        if (data.column.index === 0 && data.cell.section === 'body') {
                            const x = data.cell.x + 4;
                            const y = data.cell.y + (data.cell.height / 2) - 2;
                            doc.setDrawColor(180, 180, 180);
                            doc.setLineWidth(0.5);
                            doc.rect(x, y, 4, 4);
                        }
                    },
                    margin: { left: 14, right: 14 },
                    showHead: false
                });

                startY = doc.lastAutoTable.finalY + 15;
            });

            doc.save('JUJE-Packing-Checklist.pdf');

        } catch (error) {
            console.error('[DEBUG_LOG] PDF generation failed:', error);
            alert('Failed to generate PDF. Please try again.');
        }
    }

    function toggleSection(contentId, iconId) {
        const content = document.getElementById(contentId);
        const icon = document.getElementById(iconId);
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.innerText = "▲";
        } else {
            content.style.display = "none";
            icon.innerText = "▼";
        }
    }

    function toggleAccordion(i) {
        const content = document.getElementById(`acc-content-${i}`);
        const icon = document.getElementById(`acc-icon-${i}`);
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.innerText = "▲";
        } else {
            content.style.display = "none";
            icon.innerText = "▼";
        }
    }
</script>

</body>
</html>
