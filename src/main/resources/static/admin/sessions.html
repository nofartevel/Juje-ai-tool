<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUJE Admin - Sessions</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body { padding: 20px; font-family: sans-serif; }
        h1 { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        tr:hover { background-color: #f9f9f9; cursor: pointer; }
        .detail-panel { 
            display: none; 
            position: fixed; 
            top: 0; right: 0; 
            width: 40%; height: 100%; 
            background: white; 
            box-shadow: -2px 0 5px rgba(0,0,0,0.2); 
            padding: 20px; 
            overflow-y: auto;
            z-index: 1000;
        }
        .detail-panel h2 { margin-top: 0; }
        .close-btn { float: right; cursor: pointer; font-size: 24px; }
        .status-SUCCESS { color: green; font-weight: bold; }
        .status-FAILED { color: red; font-weight: bold; }
        .summary-box { display: flex; gap: 20px; margin-bottom: 20px; }
        .summary-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; }
        .summary-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #666; }
        .summary-card div { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Session Analytics</h1>

    <div class="summary-box">
        <div class="summary-card">
            <h3>Total Sessions</h3>
            <div id="total-sessions">0</div>
        </div>
        <div class="summary-card">
            <h3>Success Rate</h3>
            <div id="success-rate">0%</div>
        </div>
        <div class="summary-card">
            <h3>Avg Product Clicks</h3>
            <div id="avg-clicks">0</div>
        </div>
        <div class="summary-card">
            <h3>Top Clicked Products</h3>
            <div id="product-performance" style="font-size: 14px; font-weight: normal;">
                Loading...
            </div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Trip Type</th>
                <th>Ages</th>
                <th>Weather</th>
                <th>Products Shown</th>
                <th>Clicks</th>
                <th>Printed</th>
                <th>Shared</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="sessions-body">
            <!-- Sessions will be loaded here -->
        </tbody>
    </table>

    <div id="detail-panel" class="detail-panel">
        <span class="close-btn" onclick="closeDetails()">&times;</span>
        <h2>Session Details</h2>
        <div id="detail-content"></div>
    </div>

    <script>
        let allSessions = [];

        async function fetchSessions() {
            try {
                const response = await fetch('/admin/sessions');
                allSessions = await response.json();
                renderSessions();
                updateSummary();
            } catch (error) {
                console.error('Failed to fetch sessions:', error);
            }
        }

        function formatAge(ageInMonths) {
            if (ageInMonths === null || ageInMonths === undefined) return '-';
            if (ageInMonths < 12) return ageInMonths + 'm';
            const years = Math.floor(ageInMonths / 12);
            const months = ageInMonths % 12;
            return months > 0 ? `${years}y, ${months}m` : `${years}y`;
        }

        function renderSessions() {
            const tbody = document.getElementById('sessions-body');
            tbody.innerHTML = allSessions.map((s, index) => `
                <tr onclick="showDetails(${index})">
                    <td>${formatDate(s.createdAt)}</td>
                    <td>${s.transportType || '-'} / ${s.destinationTypes ? s.destinationTypes.join(' + ') : (s.destinationType || '-')}</td>
                    <td>${s.childrenAges ? s.childrenAges.map(c => formatAge(c.ageMonths || c.ageInMonths)).join('; ') : '-'}</td>
                    <td>${s.weather || '-'}</td>
                    <td>${s.generatedProducts ? s.generatedProducts.length : 0}</td>
                    <td>${s.clickedProducts ? s.clickedProducts.length : 0}</td>
                    <td>${s.printClicked ? '✅' : '❌'}</td>
                    <td>${s.shareClicked ? '✅' : '❌'}</td>
                    <td class="status-${s.generationStatus}">${s.generationStatus || 'PENDING'}</td>
                </tr>
            `).join('');
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        function updateSummary() {
            const total = allSessions.length;
            document.getElementById('total-sessions').textContent = total;
            
            if (total > 0) {
                const successes = allSessions.filter(s => s.generationStatus === 'SUCCESS').length;
                document.getElementById('success-rate').textContent = Math.round((successes / total) * 100) + '%';
                
                const totalClicks = allSessions.reduce((sum, s) => sum + (s.clickedProducts ? s.clickedProducts.length : 0), 0);
                document.getElementById('avg-clicks').textContent = (totalClicks / total).toFixed(1);
            }
            renderProductPerformance();
        }

        function renderProductPerformance() {
            const clickMap = {};
            allSessions.forEach(s => {
                if (s.clickedProducts) {
                    s.clickedProducts.forEach(p => {
                        const key = p.productName;
                        clickMap[key] = (clickMap[key] || 0) + 1;
                    });
                }
            });

            const topProducts = Object.entries(clickMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const container = document.getElementById('product-performance');
            if (topProducts.length === 0) {
                container.innerHTML = '<p style="color: #666;">No product clicks tracked yet.</p>';
                return;
            }

            container.innerHTML = `
                <ol style="padding-left: 20px;">
                    ${topProducts.map(([name, clicks]) => `
                        <li style="margin-bottom: 8px;">
                            <strong>${name}</strong> — ${clicks} click${clicks === 1 ? '' : 's'}
                        </li>
                    `).join('')}
                </ol>
            `;
        }

        function showDetails(index) {
            const s = allSessions[index];
            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');
            
            content.innerHTML = `
                <p><strong>Session ID:</strong> ${s.sessionId}</p>
                <p><strong>Time:</strong> ${formatDate(s.createdAt)}</p>
                <hr>
                <h3>Trip Context</h3>
                <p><strong>Transport:</strong> ${s.transportType || '-'}</p>
                <p><strong>Destinations:</strong> ${s.destinationTypes ? s.destinationTypes.join(', ') : (s.destinationType || '-')}</p>
                <p><strong>Weather:</strong> ${s.weather}</p>
                <p><strong>Children:</strong> ${s.childrenAges ? s.childrenAges.map(c => formatAge(c.ageMonths || c.ageInMonths)).join(', ') : 'None'}</p>
                <hr>
                <h3>Generation Status</h3>
                <p class="status-${s.generationStatus}">${s.generationStatus}</p>
                ${s.errorMessage ? `<p style="color: red;"><strong>Error:</strong> ${s.errorMessage}</p>` : ''}
                <hr>
                <h3>Products Shown (${s.generatedProducts ? s.generatedProducts.length : 0})</h3>
                <ul>
                    ${s.generatedProducts ? s.generatedProducts.map(p => `<li>${p.productName} (ID: ${p.productId})</li>`).join('') : 'None'}
                </ul>
                <hr>
                <h3>Clicked Products (${s.clickedProducts ? s.clickedProducts.length : 0})</h3>
                <ul>
                    ${s.clickedProducts ? s.clickedProducts.map(p => `<li>${p.productName} at ${new Date(p.timestamp).toLocaleTimeString()}</li>`).join('') : 'None'}
                </ul>
                <hr>
                <h3>Checklist Categories</h3>
                <p>${s.checklistCategories ? s.checklistCategories.join(', ') : 'None'}</p>
            `;
            
            panel.style.display = 'block';
        }

        function closeDetails() {
            document.getElementById('detail-panel').style.display = 'none';
        }

        fetchSessions();
        // Refresh every 30 seconds
        setInterval(fetchSessions, 30000);
    </script>
</body>
</html>
