<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JUJE</title>

    <link rel="stylesheet" href="/styles.css">
    <script src="/analytics.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <!-- Open Graph -->
    <meta property="og:title" content="Traveling with kids? We've got you covered ✈️">
    <meta property="og:description" content="Get a personalized packing list, travel tips, and reminders in minutes ✨">
    <meta property="og:image" content="https://juje-smart-lists.up.railway.app/preview.png">
    <meta property="og:url" content="https://juje-smart-lists.up.railway.app">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Traveling with kids? We've got you covered ✈️">
    <meta name="twitter:description" content="Get a personalized packing list, travel tips, and reminders in minutes ✨">
    <meta name="twitter:image" content="https://juje-smart-lists.up.railway.app/preview.png">
</head>
<body>

<div class="app-shell">
    <div class="app-card">

        <div class="top-bar">
            <div class="brand">
                <img src="/logo.png" alt="JUJE logo" class="logo"
                     onerror="this.style.display='none'; document.getElementById('fallbackBrand').style.display='block';" />
                <div id="fallbackBrand" class="brand-text" style="display:none;">JUJE</div>
            </div>
            <div id="stepIndicator" class="step-indicator"></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="screen" id="screen"></div>

    </div>
</div>

<script>
    let tripContext = {
        tripType: null,
        transportType: null,
        destinationTypes: [],
        children: [],
        weather: "HOT"
    };
    let currentPlan = null;

    let childUnits = []; // Track unit per child: 'months' or 'years'

    function updateHeader(step, total, label) {
        const indicator = document.getElementById("stepIndicator");
        const fill = document.getElementById("progressFill");
        const progressContainer = document.querySelector(".progress-container");
        const topBar = document.querySelector(".top-bar");
        
        if (step === 0) {
            indicator.innerText = "";
            fill.style.width = "0%";
            progressContainer.style.display = "none";
            topBar.style.display = "none";
        } else {
            indicator.innerText = `${label} • Step ${step} of ${total}`;
            fill.style.width = `${(step / total) * 100}%`;
            progressContainer.style.display = "block";
            topBar.style.display = "flex";
        }
    }

    function renderIntroScreen() {
        updateHeader(0, 4, "");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="hero intro-hero">
                <div class="trust-signals" style="margin-bottom: 24px; display: flex; flex-direction: column; align-items: center; gap: 8px;">
                    <span class="trust-badge" style="background: var(--secondary); color: var(--text); padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 700;">✨ Built for families on the move</span>
                    <div style="display: flex; gap: 12px; font-size: 12px; color: var(--muted); font-weight: 600;">
                        <span>✓ Takes ~60s</span>
                        <span>✓ No signup</span>
                        <span>✓ Free</span>
                    </div>
                </div>

                <h1 class="hero-title">Traveling with kids? We've got you covered ✈️</h1>
                <p class="hero-subtitle">Get a personalized packing list, travel tips, reminders and product recommendations in minutes.</p>
                
                <div class="value-props-list" style="margin: 32px 0;">
                    <div class="v-prop-row">✅ Personalized packing checklist</div>
                    <div class="v-prop-row">✅ Travel tips by child age</div>
                    <div class="v-prop-row">✅ Things parents often forget</div>
                    <div class="v-prop-row">✅ Gear recommendations</div>
                </div>

                <button class="btn btn-primary btn-full" onclick="renderTransportStep()">Start Planning →</button>
            </div>
        `;
    }

    function renderTransportStep() {
        updateHeader(1, 4, "Transport");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="btn-back" onclick="renderIntroScreen()">← Back</div>
            <div class="hero">
                <h1 class="hero-title">How are you getting there?</h1>
                <p class="hero-subtitle">Choose your transportation method</p>
                
                <div class="selectable-grid">
                    <div class="selectable-card" onclick="setTransportType('FLIGHT', this)">
                        <div class="selectable-icon">✈️</div>
                        <div class="selectable-info">
                            <span class="selectable-label">Flight</span>
                            <span class="selectable-sub">Standard air travel</span>
                        </div>
                    </div>
                    <div class="selectable-card" onclick="setTransportType('ROAD_TRIP', this)">
                        <div class="selectable-icon">🚗</div>
                        <div class="selectable-info">
                            <span class="selectable-label">Road Trip</span>
                            <span class="selectable-sub">Driving long distance</span>
                        </div>
                    </div>
                    <div class="selectable-card" onclick="setTransportType('CRUISE', this)">
                        <div class="selectable-icon">🚢</div>
                        <div class="selectable-info">
                            <span class="selectable-label">Cruise</span>
                            <span class="selectable-sub">Voyage by sea</span>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function setTransportType(type, element) {
        if (element) {
            element.classList.add('selected');
        }
        tripContext.transportType = type;
        tripContext.tripType = type;
        setTimeout(() => renderDestinationStep(), 150);
    }

    function renderDestinationStep() {
        updateHeader(2, 4, "Destination");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="btn-back" onclick="renderTransportStep()">← Back</div>
            <div class="hero">
                <h1 class="hero-title">What kind of trip is this?</h1>
                <p class="hero-subtitle">Choose one or more</p>
                
                <div class="selectable-grid">
                    <div class="selectable-card ${tripContext.destinationTypes.includes('BEACH') ? 'selected' : ''}" 
                         onclick="toggleDestinationType('BEACH', this)"
                         role="checkbox" 
                         aria-checked="${tripContext.destinationTypes.includes('BEACH')}"
                         tabindex="0">
                        <div class="selectable-icon">🏖️</div>
                        <div class="selectable-info">
                            <span class="selectable-label">Beach</span>
                            <span class="selectable-sub">Sun, sand and water</span>
                        </div>
                        <div class="selection-indicator">${tripContext.destinationTypes.includes('BEACH') ? '✓' : '○'}</div>
                    </div>
                    <div class="selectable-card ${tripContext.destinationTypes.includes('RESORT') ? 'selected' : ''}" 
                         onclick="toggleDestinationType('RESORT', this)"
                         role="checkbox" 
                         aria-checked="${tripContext.destinationTypes.includes('RESORT')}"
                         tabindex="0">
                        <div class="selectable-icon">🏨</div>
                        <div class="selectable-info">
                            <span class="selectable-label">Resort</span>
                            <span class="selectable-sub">Hotel, pool and all-inclusive stays</span>
                        </div>
                        <div class="selection-indicator">${tripContext.destinationTypes.includes('RESORT') ? '✓' : '○'}</div>
                    </div>
                    <div class="selectable-card ${tripContext.destinationTypes.includes('CITY') ? 'selected' : ''}" 
                         onclick="toggleDestinationType('CITY', this)"
                         role="checkbox" 
                         aria-checked="${tripContext.destinationTypes.includes('CITY')}"
                         tabindex="0">
                        <div class="selectable-icon">🏙️</div>
                        <div class="selectable-info">
                            <span class="selectable-label">City</span>
                            <span class="selectable-sub">Sightseeing and urban exploration</span>
                        </div>
                        <div class="selection-indicator">${tripContext.destinationTypes.includes('CITY') ? '✓' : '○'}</div>
                    </div>
                    <div class="selectable-card ${tripContext.destinationTypes.includes('CAMPING') ? 'selected' : ''}" 
                         onclick="toggleDestinationType('CAMPING', this)"
                         role="checkbox" 
                         aria-checked="${tripContext.destinationTypes.includes('CAMPING')}"
                         tabindex="0">
                        <div class="selectable-icon">🏕️</div>
                        <div class="selectable-info">
                            <span class="selectable-label">Camping</span>
                            <span class="selectable-sub">Outdoor stays and nature trips</span>
                        </div>
                        <div class="selection-indicator">${tripContext.destinationTypes.includes('CAMPING') ? '✓' : '○'}</div>
                    </div>
                </div>

                <div id="selection-counter" class="selection-counter">
                    ${tripContext.destinationTypes.length > 0 ? tripContext.destinationTypes.length + ' selected' : ''}
                </div>

                <div style="margin-top: 16px;">
                    <button id="dest-continue-btn" class="btn btn-primary btn-full" onclick="renderFamilyStep()" ${tripContext.destinationTypes.length === 0 ? 'disabled' : ''}>Continue</button>
                </div>
            </div>
        `;
    }

    function toggleDestinationType(type, element) {
        const index = tripContext.destinationTypes.indexOf(type);
        const indicator = element.querySelector('.selection-indicator');
        
        if (index > -1) {
            tripContext.destinationTypes.splice(index, 1);
            element.classList.remove('selected');
            element.setAttribute('aria-checked', 'false');
            if (indicator) indicator.innerText = '○';
        } else {
            tripContext.destinationTypes.push(type);
            element.classList.add('selected');
            element.setAttribute('aria-checked', 'true');
            if (indicator) indicator.innerText = '✓';
        }
        
        const count = tripContext.destinationTypes.length;
        const continueBtn = document.getElementById('dest-continue-btn');
        if (continueBtn) {
            continueBtn.disabled = count === 0;
        }

        const counter = document.getElementById('selection-counter');
        if (counter) {
            counter.innerText = count > 0 ? count + ' selected' : '';
        }
    }

    function renderFamilyStep() {
        updateHeader(3, 4, "Family");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="btn-back" onclick="renderDestinationStep()">← Back</div>
            <div class="hero">
                <h1 class="hero-title">Who's coming along? 👨‍👩‍👧‍👦</h1>
                <p class="hero-subtitle">Age helps us personalize your checklist and tips</p>
                <div id="childrenList" class="children-list"></div>
                <button class="btn btn-secondary" onclick="addChild()">+ Add Child</button>
                <br><br>
                <button class="btn btn-primary btn-full" onclick="renderLogisticsStep()">Next Step</button>
            </div>
        `;
        updateChildrenList();
    }

    function addChild() {
        // Default new child with no age set (undefined or null) and 'years' unit
        tripContext.children.push({ ageMonths: undefined });
        childUnits.push('years');
        updateChildrenList();
    }

    function updateChildrenList() {
        const list = document.getElementById("childrenList");
        list.innerHTML = tripContext.children.map((c, i) => {
            const hasAge = c.ageMonths !== undefined && c.ageMonths !== null;
            const unit = childUnits[i] || 'years';
            
            // For display, if unit is years, we show ageMonths/12, otherwise ageMonths
            let displayValue = "";
            if (hasAge) {
                displayValue = (unit === 'years') ? Math.floor(c.ageMonths / 12) : c.ageMonths;
            }

            return `
                <div class="child-card">
                    <div class="child-card-header">
                        <span class="child-label">Child ${i+1}</span>
                        <button class="btn-icon" onclick="removeChildAtIndex(${i})">🗑️</button>
                    </div>
                    <div class="age-input-container">
                        <input type="number" 
                               inputmode="numeric"
                               pattern="[0-9]*"
                               class="age-input" 
                               value="${displayValue || ''}" 
                               oninput="updateChildAge(${i}, this.value)"
                               placeholder="Age">
                    </div>
                    <div class="segmented-control">
                        <div class="segmented-option ${unit === 'months' ? 'active' : ''}" onclick="setChildUnit(${i}, 'months')">Months</div>
                        <div class="segmented-option ${unit === 'years' ? 'active' : ''}" onclick="setChildUnit(${i}, 'years')">Years</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function setChildUnit(i, unit) {
        const currentVal = tripContext.children[i].ageMonths;
        const currentUnit = childUnits[i];
        
        if (currentUnit === unit) return;
        
        childUnits[i] = unit;
        
        // If there was a value, we might want to preserve it or just re-render
        // The instructions say "Tapping Months switches the unit". 
        // We need to make sure the value in the input is re-interpreted correctly.
        // Actually, updateChildrenList will re-render with the correct displayValue.
        updateChildrenList();
    }

    function updateChildAge(i, val) {
        let valInt = parseInt(val);
        if (isNaN(valInt)) {
            tripContext.children[i].ageMonths = undefined;
            return;
        }
        const unit = childUnits[i];
        let ageMonths = valInt;
        if (unit === 'years') {
            ageMonths = valInt * 12;
        }
        tripContext.children[i].ageMonths = ageMonths;
    }
    function removeChildAtIndex(i) { 
        tripContext.children.splice(i, 1); 
        childUnits.splice(i, 1);
        updateChildrenList(); 
    }

    function renderLogisticsStep() {
        updateHeader(4, 4, "Details");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="btn-back" onclick="renderFamilyStep()">← Back</div>
            <div class="hero">
                <h1 class="hero-title">Let's personalize your plan ✨</h1>
                <p class="hero-subtitle">Almost there! Just one last detail.</p>
                
                <div class="input-group">
                    <label>What weather do you expect?</label>
                    <div class="weather-grid">
                        <div class="weather-card ${tripContext.weather === 'HOT' ? 'active' : ''}" onclick="setWeather('HOT')">
                            <span class="weather-icon">☀️</span>
                            <span class="weather-label">Hot</span>
                        </div>
                        <div class="weather-card ${tripContext.weather === 'MIXED' ? 'active' : ''}" onclick="setWeather('MIXED')">
                            <span class="weather-icon">🌤️</span>
                            <span class="weather-label">Mixed</span>
                        </div>
                        <div class="weather-card ${tripContext.weather === 'COLD' ? 'active' : ''}" onclick="setWeather('COLD')">
                            <span class="weather-icon">❄️</span>
                            <span class="weather-label">Cold</span>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary btn-full" onclick="generatePlan()">Generate Plan ✨</button>
            </div>
        `;
    }

    function setWeather(weather) {
        tripContext.weather = weather;
        renderLogisticsStep();
    }

    async function generatePlan() {
        // Validation
        if (tripContext.children.length === 0) {
            alert("Please add at least one child.");
            renderFamilyStep();
            return;
        }
        const invalidChild = tripContext.children.some(c => c.ageMonths === undefined || c.ageMonths === null);
        if (invalidChild) {
            alert("Please enter the age for all children.");
            renderFamilyStep();
            return;
        }

        const startTime = performance.now();
        renderLoadingScreen();
        
        // Track session start (force new session for every new plan)
        JujeAnalytics.init(true);
        JujeAnalytics.trackSessionStart(tripContext);

        try {
            const res = await fetch('/api/v1/generate-travel-plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tripContext)
            });
            const fetchEndTime = performance.now();
            console.log(`[PERF] Frontend Fetch: ${Math.round(fetchEndTime - startTime)}ms`);
            console.log("Response from server:", res);

            const data = await res.json();
            console.log("Parsed data:", data);
            
            if (!res.ok) {
                JujeAnalytics.trackPlanGenerated(false, data.message || "Failed to generate plan", [], []);
                alert(data.message || "Failed to generate plan");
                renderIntroScreen();
                return;
            }

            currentPlan = data;
            
            // Track successful generation
            const products = (data.recommendedProducts || []).map(p => ({ productId: p.id, productName: p.name }));
            const categories = (data.packingChecklist || []).map(c => c.categoryName);
            JujeAnalytics.trackPlanGenerated(true, null, products, categories);

            const parseEndTime = performance.now();
            console.log(`[PERF] Frontend JSON Parse: ${Math.round(parseEndTime - fetchEndTime)}ms`);

            renderPlanScreen();
            const renderEndTime = performance.now();
            console.log(`[PERF] Frontend Render: ${Math.round(renderEndTime - parseEndTime)}ms`);
            console.log(`[PERF] Total Frontend Time: ${Math.round(renderEndTime - startTime)}ms`);
        } catch (e) {
            console.error("Generation error:", e);
            alert("An error occurred: " + e.message);
            renderIntroScreen();
        }
    }

    function renderLoadingScreen() {
        const iconMap = {
            'FLIGHT': '✈️',
            'ROAD_TRIP': '🚗',
            'BEACH': '🏖️',
            'CRUISE': '🚢',
            'CAMPING': '⛺',
            'GENERAL': '🌍'
        };
        const icon = iconMap[tripContext.transportType] || iconMap[tripContext.tripType] || '✨';
        const loadingMessages = [
            "Building your personalized family travel plan...",
            "Creating your packing checklist...",
            "Finding the best tips and gear..."
        ];
        let msgIndex = 0;

        updateHeader(0, 3, ""); // Hide header during loading

        document.getElementById("screen").innerHTML = `
            <div class="loading-state" style="text-align: center; padding: 60px 20px;">
                <div class="travel-animation" style="font-size: 50px; margin-bottom: 30px; animation: travelAnimation 2s ease-in-out infinite;">
                    ${icon}
                </div>
                <h3 id="loading-msg" style="color: var(--primary); font-weight: 700;">${loadingMessages[0]}</h3>
                <p style="color: var(--muted); margin-top: 10px;">This may take a moment</p>
            </div>
        `;

        const msgInterval = setInterval(() => {
            msgIndex = (msgIndex + 1) % loadingMessages.length;
            const msgEl = document.getElementById("loading-msg");
            if (msgEl) {
                msgEl.innerText = loadingMessages[msgIndex];
            } else {
                clearInterval(msgInterval);
            }
        }, 3000);
    }

    function renderPlanScreen() {
        updateHeader(0, 3, ""); // Reset header for results
        console.log("currentPlan received from backend:", currentPlan);
        
        const screen = document.getElementById("screen");
        const forgottenItems = currentPlan.forgottenItems || [];
        const products = currentPlan.recommendedProducts || [];
        const tips = currentPlan.travelTips || [];
        const checklist = currentPlan.packingChecklist || [];
        const resources = currentPlan.travelResources || [];

        // Group products by category
        const categorizedProducts = {};
        products.forEach(p => {
            const cat = p.activity_type || 'GENERAL';
            if (!categorizedProducts[cat]) categorizedProducts[cat] = [];
            categorizedProducts[cat].push(p);
        });

        const categoryIcons = {
            'TRAVEL': '✈️',
            'OUTDOOR': '☀️',
            'FEEDING': '🍽️',
            'PLAY': '🎨',
            'DIAPERING': '🧼',
            'BATH': '🛁',
            'GENERAL': '⭐'
        };

        const categoryNames = {
            'TRAVEL': 'Travel Essentials',
            'OUTDOOR': 'Outdoor & Beach',
            'FEEDING': 'Feeding',
            'PLAY': 'Entertainment',
            'DIAPERING': 'Diapering & Care',
            'BATH': 'Bath Time',
            'GENERAL': 'Top Recommendations'
        };

        const tripIconMap = {
            'FLIGHT': '✈️',
            'ROAD_TRIP': '🚗',
            'BEACH': '🏖️',
            'CRUISE': '🚢',
            'CAMPING': '⛺',
            'GENERAL': '🌍'
        };

        const totalItemsCount = checklist.reduce((sum, cat) => sum + (cat.items ? cat.items.length : 0), 0);

        // Populate printable checklist
        const printableChecklist = document.getElementById('printableChecklist');
        if (printableChecklist) {
            printableChecklist.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <img src="/logo.png" alt="JUJE logo" style="height: 50px; margin-bottom: 10px;">
                    <div style="font-size: 14px; color: #666; font-weight: 700;">
                        ${tripContext.tripType.replace(/_/g, ' ')} • ${tripContext.children.length} Child${tripContext.children.length > 1 ? 'ren' : ''} • ${tripContext.weather}
                    </div>
                </div>
                <h1 style="text-align: center; margin-bottom: 30px;">Packing Checklist</h1>
                ${checklist.map(cat => `
                    <div style="margin-bottom: 25px;">
                        <h2 style="border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; font-size: 18px;">${cat.categoryName}</h2>
                        <ul style="list-style: none; padding: 0; margin: 0;">
                            ${(cat.items || []).map(item => `
                                <li style="margin-bottom: 10px; display: flex; align-items: flex-start; font-size: 14px;">
                                    <div style="width: 18px; height: 18px; border: 1px solid #333; margin-right: 12px; flex-shrink: 0; border-radius: 3px;"></div>
                                    <span>${item}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `).join('')}
            `;
        }

        screen.innerHTML = `
            <div class="result-container" style="animation: fadeInUp 0.5s ease;">
                <!-- Summary Header -->
                <div class="summary-header">
                    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                        <div style="font-size: 40px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));">${tripIconMap[tripContext.tripType] || '✨'}</div>
                        <div>
                            <h3>${tripContext.tripType.replace(/_/g, ' ')}</h3>
                            <div style="font-size: 14px; color: var(--muted); font-weight: 700;">
                                ${tripContext.children.length} Children • ${tripContext.weather}
                            </div>
                        </div>
                    </div>

                    <!-- Highlight Card -->
                    <div class="status-card status-good" style="margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; padding: 16px 20px;">
                        <div style="font-weight: 700; color: var(--text);">
                            ⭐ ${products.length} products matched to your trip
                        </div>
                        <button class="btn btn-primary" style="min-height: auto; padding: 8px 16px; font-size: 13px;" onclick="document.getElementById('gear-content').scrollIntoView({behavior: 'smooth'}); if(document.getElementById('gear-content').style.display === 'none') toggleSection('gear-content', 'gear-icon');">
                            View Recommendations
                        </button>
                    </div>
                    
                    <div class="summary-metrics" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center;">
                        <div class="metric-item" onclick="document.getElementById('checklist-content').scrollIntoView({behavior: 'smooth'}); if(document.getElementById('checklist-content').style.display === 'none') toggleSection('checklist-content', 'checklist-icon');" style="cursor: pointer;">
                            <div class="metric-value">${totalItemsCount}</div>
                            <div class="metric-label">Items</div>
                        </div>
                        <div class="metric-item" onclick="document.getElementById('tips-content').scrollIntoView({behavior: 'smooth'}); if(document.getElementById('tips-content').style.display === 'none') toggleSection('tips-content', 'tips-icon');" style="cursor: pointer;">
                            <div class="metric-value">${tips.length}</div>
                            <div class="metric-label">Tips</div>
                        </div>
                        <div class="metric-item" onclick="document.getElementById('reminders-content').scrollIntoView({behavior: 'smooth'}); if(document.getElementById('reminders-content').style.display === 'none') toggleSection('reminders-content', 'reminders-icon');" style="cursor: pointer;">
                            <div class="metric-value">${forgottenItems.length}</div>
                            <div class="metric-label">Forget</div>
                        </div>
                        <div class="metric-item" onclick="document.getElementById('gear-content').scrollIntoView({behavior: 'smooth'}); if(document.getElementById('gear-content').style.display === 'none') toggleSection('gear-content', 'gear-icon');" style="cursor: pointer;">
                            <div class="metric-value">${products.length}</div>
                            <div class="metric-label">Gear</div>
                        </div>
                    </div>
                </div>

                <div class="result-dashboard">
                    <!-- 1. Products / Gear (Open by default) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('gear-content', 'gear-icon')">
                            <div>
                                <h3><span>🛒</span> Recommended Gear</h3>
                                <div class="section-header-desc">Curated gear for your specific needs</div>
                            </div>
                            <span id="gear-icon" style="color: var(--primary); font-size: 12px;">▲</span>
                        </div>
                        <div id="gear-content" class="section-content" style="display: block;">
                            ${Object.keys(categorizedProducts).length > 0 ? Object.keys(categorizedProducts).map((catKey, idx) => {
                                const products = categorizedProducts[catKey];
                                const initialCount = 6;
                                const hasMore = products.length > initialCount;
                                
                                return `
                                    <div class="gear-category-section">
                                        <h4 class="gear-category-title">
                                            <span style="margin-right: 8px;">${categoryIcons[catKey.toUpperCase()] || '⭐'}</span>
                                            ${categoryNames[catKey.toUpperCase()] || catKey} · ${products.length}
                                        </h4>
                                        <div class="product-grid" id="grid-${idx}">
                                            ${products.map((p, pIdx) => `
                                                <article class="product-card ${pIdx >= initialCount ? 'hidden-product' : ''}" 
                                                         onclick="window.open('${p.link}', '_blank'); JujeAnalytics.trackProductClick('${p.id}', '${p.name.replace(/'/g, "\\'")}');">
                                                    <div class="product-image-container">
                                                        <img src="${p.image}" onerror="this.src='/logo.png'" class="product-image">
                                                    </div>
                                                    <div class="product-content">
                                                        <h3 class="product-name">${p.name}</h3>
                                                        <p class="product-reason">${p.why || ''}</p>
                                                        <a class="product-button">View Product</a>
                                                    </div>
                                                </article>
                                            `).join('')}
                                        </div>
                                        ${hasMore ? `
                                            <div style="text-align: center; margin-top: 16px;">
                                                <button id="btn-more-${idx}" class="btn-show-more" onclick="toggleShowMore(${idx})">
                                                    Show ${products.length - initialCount} more
                                                </button>
                                            </div>
                                        ` : ''}
                                    </div>
                                `;
                            }).join('') : `
                                <div style="text-align: center; padding: 40px 20px; color: var(--muted);">
                                    <p>No products returned for this trip context.</p>
                                </div>
                            `}
                        </div>
                    </div>

                    <!-- 2. Travel Tips (Collapsed by default) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('tips-content', 'tips-icon')">
                            <div>
                                <h3><span>💡</span> Parent Tips</h3>
                                <div class="section-header-desc">Age-appropriate travel wisdom</div>
                            </div>
                            <span id="tips-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                        </div>
                        <div id="tips-content" class="section-content" style="display: none;">
                            <div class="tips-grid" style="display: grid; grid-template-columns: 1fr; gap: 16px;">
                                ${tips.map(tip => `
                                    <div style="background: var(--white); padding: 20px; border-radius: var(--radius-md); border-left: 6px solid var(--primary); box-shadow: var(--shadow-soft); line-height: 1.6; font-size: 15px; color: var(--text);">
                                        ${tip}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- 3. Things Parents Forget (Collapsed by default) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('reminders-content', 'reminders-icon')">
                            <div>
                                <h3><span>⚠️</span> Don't Forget These</h3>
                                <div class="section-header-desc">Critical reminders for a smooth trip</div>
                            </div>
                            <span id="reminders-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                        </div>
                        <div id="reminders-content" class="section-content" style="display: none;">
                            <ul style="list-style: none; padding: 0; margin: 0;">
                                ${forgottenItems.map(item => `<li style="margin-bottom: 16px; display: flex; align-items: flex-start; line-height: 1.5; background: var(--white); padding: 14px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border); box-shadow: var(--shadow-soft); color: var(--text);">
                                    <span style="color: #d9534f; margin-right: 12px; font-size: 18px; line-height: 1;">⚠️</span>
                                    <span style="font-size: 15px; font-weight: 600;">${item}</span>
                                </li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    <!-- 4. Packing Checklist (Collapsed by default) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('checklist-content', 'checklist-icon')">
                            <div>
                                <h3><span>📦</span> What To Pack</h3>
                                <div class="section-header-desc">Essential items for your family trip</div>
                            </div>
                            <span id="checklist-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                        </div>
                        <div id="checklist-content" class="section-content" style="display: none;">
                            <div class="accordion">
                                ${checklist.map((cat, i) => `
                                    <div class="category-collapsible">
                                        <div class="category-header" onclick="toggleAccordion(${i})">
                                            <div class="category-header-info">
                                                <div class="category-header-title">${cat.categoryName} · ${(cat.items || []).length}</div>
                                            </div>
                                            <span id="acc-icon-${i}" style="color: var(--primary); font-size: 12px;">▼</span>
                                        </div>
                                        <div id="acc-content-${i}" class="category-content" style="display: none; padding: 20px 24px;">
                                            <ul style="list-style: none; padding: 0; margin: 0;">
                                                ${(cat.items || []).map(item => `<li style="margin-bottom: 12px; display: flex; align-items: flex-start; font-size: 14px; line-height: 1.4;"><input type="checkbox" style="margin-right: 12px; margin-top: 3px; accent-color: var(--primary); width: 18px; height: 18px; flex-shrink: 0;"> <span>${item}</span></li>`).join('')}
                                            </ul>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; justify-content: center; margin-top: 32px;">
                        <button class="btn btn-secondary" style="flex: 1; min-width: auto;" onclick="generatePDF()">Print Checklist</button>
                        <button class="btn btn-primary" style="flex: 2; min-width: auto;" onclick="savePlan()">Share Plan</button>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
                    <button class="btn-text" style="color: var(--muted); font-size: 14px; font-weight: 600; text-decoration: none;" onclick="renderIntroScreen()">Start New Plan</button>
                </div>
            </div>
        `;
    }

    function toggleSection(contentId, iconId) {
        const content = document.getElementById(contentId);
        const icon = document.getElementById(iconId);
        if (!content || !icon) return;
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.innerText = "▲";
        } else {
            content.style.display = "none";
            icon.innerText = "▼";
        }
    }

    function toggleShowMore(catIdx) {
        const grid = document.getElementById(`grid-${catIdx}`);
        const btn = document.getElementById(`btn-more-${catIdx}`);
        const cards = grid.querySelectorAll('.product-card.hidden-product');
        
        cards.forEach(card => card.classList.remove('hidden-product'));
        btn.style.display = 'none';
    }

    function toggleAccordion(i) {
        const content = document.getElementById(`acc-content-${i}`);
        const icon = document.getElementById(`acc-icon-${i}`);
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.innerText = "▲";
        } else {
            content.style.display = "none";
            icon.innerText = "▼";
        }
    }

    async function generatePDF() {
        JujeAnalytics.trackPrintClick();
        if (!currentPlan || !currentPlan.packingChecklist) {
            console.error('[DEBUG_LOG] No current plan or packing checklist data available');
            alert('No packing checklist data found. Please generate a plan first.');
            return;
        }

        const checklist = currentPlan.packingChecklist;
        const context = currentPlan.context || {};
        
        console.log('[DEBUG_LOG] TravelPlan found: true');
        console.log('[DEBUG_LOG] tripType:', context.tripType);
        console.log('[DEBUG_LOG] children:', context.children ? context.children.length : 0);
        console.log('[DEBUG_LOG] weather:', context.weather);
        console.log('[DEBUG_LOG] packingChecklist size:', checklist.length);
        
        checklist.forEach(cat => {
            console.log(`[DEBUG_LOG] ${cat.categoryName}: ${cat.items ? cat.items.length : 0} items`);
        });

        if (checklist.length === 0 || checklist.every(cat => !cat.items || cat.items.length === 0)) {
            alert('The checklist is empty. Nothing to print.');
            return;
        }

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();

            // 1. JUJE Logo (Placeholder text for now, but in a real app we'd use an image)
            doc.setFontSize(24);
            doc.setTextColor(255, 107, 107); // JUJE color
            doc.setFont("helvetica", "bold");
            doc.text("JUJE", pageWidth / 2, 20, { align: "center" });

            // 2. Trip Summary
            doc.setFontSize(12);
            doc.setTextColor(100, 100, 100);
            doc.setFont("helvetica", "normal");
            
            const context = currentPlan.context || {};
            
            const tripTypeMap = {
                'FLIGHT': 'Flight',
                'ROAD_TRIP': 'Road Trip',
                'BEACH': 'Beach Trip',
                'CRUISE': 'Cruise',
                'CAMPING': 'Camping',
                'GENERAL': 'Travel Plan'
            };
            
            const tripType = tripTypeMap[context.tripType] || context.tripType || "Travel Plan";
            const childrenCount = context.children ? context.children.length : 0;
            const weather = context.weather ? (context.weather.charAt(0).toUpperCase() + context.weather.slice(1).toLowerCase()) : "Family Trip";
            
            const summaryText = `${tripType} • ${childrenCount} ${childrenCount === 1 ? 'child' : 'children'} • ${weather}`;
            doc.text(summaryText, pageWidth / 2, 30, { align: "center" });

            // 2b. Generation Date
            doc.setFontSize(9);
            doc.setTextColor(150, 150, 150);
            const today = new Date();
            const dateString = `Generated on ${today.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
            doc.text(dateString, pageWidth / 2, 35, { align: "center" });

            // 3. Packing Checklist Title
            doc.setFontSize(18);
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "bold");
            doc.text("Packing Checklist", pageWidth / 2, 48, { align: "center" });

            let startY = 60;

            // 4. Checklist Categories & Items
            checklist.forEach((category, index) => {
                if (!category.items || category.items.length === 0) return;

                // Check for page overflow
                if (startY > 250) {
                    doc.addPage();
                    startY = 20;
                }

                doc.setFontSize(14);
                doc.setTextColor(255, 107, 107);
                doc.setFont("helvetica", "bold");
                doc.text(`${index + 1}. ${category.categoryName}`, 14, startY);
                startY += 8;

                const tableData = category.items.map(item => ["", item]);
                
                doc.autoTable({
                    startY: startY,
                    body: tableData,
                    columns: [
                        { header: "", dataKey: 0 },
                        { header: "Item", dataKey: 1 }
                    ],
                    theme: 'plain',
                    styles: { 
                        fontSize: 11, 
                        cellPadding: { top: 3, right: 2, bottom: 3, left: 2 },
                        textColor: [50, 50, 50]
                    },
                    columnStyles: {
                        0: { cellWidth: 12, halign: 'center' }, // For the empty checkbox
                        1: { cellWidth: 'auto' }
                    },
                    didDrawCell: (data) => {
                        if (data.column.index === 0 && data.cell.section === 'body') {
                            // Draw an empty checkbox
                            const x = data.cell.x + 4;
                            const y = data.cell.y + (data.cell.height / 2) - 2;
                            doc.setDrawColor(180, 180, 180);
                            doc.setLineWidth(0.5);
                            doc.rect(x, y, 4, 4);
                        }
                    },
                    margin: { left: 14, right: 14 },
                    showHead: false
                });

                startY = doc.lastAutoTable.finalY + 15;
            });

            doc.save('JUJE-Packing-Checklist.pdf');

        } catch (error) {
            console.error('[DEBUG_LOG] PDF generation failed:', error);
            alert('Failed to generate PDF. Please try again.');
        }
    }

    async function savePlan() {
        JujeAnalytics.trackShareClick();
        
        let planId = null;

        // Stage A: Save plan
        try {
            // Normalize products before saving
            if (currentPlan && currentPlan.recommendedProducts) {
                currentPlan.recommendedProducts.forEach(p => {
                    p.is_essential = p.is_essential === true;
                });
            }

            console.log("Saving plan with payload:", currentPlan);
            const response = await fetch('/api/v1/save-plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentPlan)
            });

            const responseText = await response.text();
            console.log("Save plan response status:", response.status);
            console.log("Save plan response body:", responseText);

            if (!response.ok) {
                console.error("Save plan failed:", response.status, responseText);
                alert("Could not save the plan. Please try again.");
                return;
            }

            const data = JSON.parse(responseText);
            planId = data.id;
            console.log("Confirmed returned plan id:", planId);

            if (!planId) {
                console.error("Save plan failed: No ID in response");
                alert("Could not save the plan. Please try again.");
                return;
            }
        } catch (error) {
            console.error("Save plan error:", error);
            alert("Could not save the plan. Please try again.");
            return;
        }

        // Stage B: Share
        try {
            const shareUrl = window.location.origin + '/plan-view.html?id=' + planId;
            console.log("Generated share URL:", shareUrl);

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: "My JUJE Family Travel Plan",
                        text: "Here’s a family travel plan with packing checklist, tips and gear recommendations 💛",
                        url: shareUrl
                    });
                } catch (shareError) {
                    console.error("Share failed:", shareError);
                    copyToClipboard(shareUrl);
                    alert("Your plan was saved, but the share menu could not open. The link has been copied.");
                }
            } else {
                copyToClipboard(shareUrl);
                alert("Share link copied to clipboard! 📋\n\n" + shareUrl);
            }
        } catch (error) {
            console.error("Share failed:", error);
            alert("Something went wrong while sharing the plan.");
        }
    }

    function copyToClipboard(text) {
        const dummy = document.createElement("input");
        document.body.appendChild(dummy);
        dummy.value = text;
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
    }


    renderIntroScreen();

</script>

</body>
</html>
