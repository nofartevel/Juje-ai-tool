<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JUJE</title>

    <link rel="stylesheet" href="/styles.css">

    <!-- Open Graph -->
    <meta property="og:title" content="Smart lists for real mom life 💛">
    <meta property="og:description" content="Tell me what you need and get a ready list in seconds ✨">
    <meta property="og:image" content="https://juje-smart-lists.up.railway.app/preview.png">
    <meta property="og:url" content="https://juje-smart-lists.up.railway.app">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Smart lists for real mom life 💛">
    <meta name="twitter:description" content="Get a ready list in seconds ✨">
    <meta name="twitter:image" content="https://juje-smart-lists.up.railway.app/preview.png">
</head>
<body>

<div class="app-shell">
    <div class="app-card">

        <div class="top-bar">
            <div class="brand">
                <img src="/logo.png" alt="JUJE logo" class="logo"
                     onerror="this.style.display='none'; document.getElementById('fallbackBrand').style.display='block';" />
                <div id="fallbackBrand" class="brand-text" style="display:none;">JUJE</div>
            </div>
        </div>

        <div class="screen" id="screen"></div>

    </div>
</div>

<script>
    let tripContext = {
        tripType: null,
        children: [],
        durationDays: 7,
        destination: "",
        weather: "HOT"
    };
    let currentPlan = null;

    function renderIntroScreen() {
        if (typeof renderTripTypeStep === 'function') {
            renderTripTypeStep();
        } else {
            console.error("renderTripTypeStep not found");
        }
    }

    function renderTripTypeStep() {
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="hero">
                <h1 class="hero-title">Where are you going? 🌍</h1>
                <p class="hero-subtitle">Select your trip type to get started</p>
                <div class="category-grid">
                    <button class="category-btn" onclick="setTripType('FLIGHT')">Flight ✈️</button>
                    <button class="category-btn" onclick="setTripType('ROAD_TRIP')">Road Trip 🚗</button>
                    <button class="category-btn" onclick="setTripType('BEACH')">Beach Vacation 🏖️</button>
                    <button class="category-btn" onclick="setTripType('CRUISE')">Cruise 🚢</button>
                    <button class="category-btn" onclick="setTripType('CAMPING')">Camping ⛺</button>
                    <button class="category-btn" onclick="setTripType('GENERAL')">General Travel 🧳</button>
                </div>
            </div>
        `;
    }

    function setTripType(type) {
        tripContext.tripType = type;
        renderFamilyStep();
    }

    function renderFamilyStep() {
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="hero">
                <h1 class="hero-title">Family Details 👨‍👩‍👧‍👦</h1>
                <p class="hero-subtitle">Add your children and their ages</p>
                <div id="childrenList" class="children-list"></div>
                <button class="btn btn-secondary" onclick="addChild()">+ Add Child</button>
                <br><br>
                <button class="btn btn-primary btn-full" onclick="renderLogisticsStep()">Next Step</button>
            </div>
        `;
        updateChildrenList();
    }

    function addChild() {
        tripContext.children.push({ ageMonths: 24 });
        updateChildrenList();
    }

    function updateChildrenList() {
        const list = document.getElementById("childrenList");
        list.innerHTML = tripContext.children.map((c, i) => `
            <div class="child-row">
                <span>Child ${i+1}:</span>
                <input type="number" value="${c.ageMonths}" onchange="updateChildAge(${i}, this.value)" style="width: 80px;">
                <span>months</span>
                <button onclick="removeChild(${i})">🗑️</button>
            </div>
        `).join('');
    }

    function updateChildAge(i, val) { tripContext.children[i].ageMonths = parseInt(val); }
    function removeChild(i) { tripContext.children.splice(i, 1); updateChildrenList(); }

    function renderLogisticsStep() {
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="hero">
                <h1 class="hero-title">Trip Details 🗓️</h1>
                <p class="hero-subtitle">A few more details for the AI</p>
                <div class="input-group">
                    <label>Duration (days):</label>
                    <input type="number" value="${tripContext.durationDays}" onchange="tripContext.durationDays = parseInt(this.value)" class="input">
                </div>
                <div class="input-group">
                    <label>Destination (optional):</label>
                    <input type="text" placeholder="e.g. London, Thailand" onchange="tripContext.destination = this.value" class="input">
                </div>
                <div class="input-group">
                    <label>Expected Weather:</label>
                    <select onchange="tripContext.weather = this.value" class="input">
                        <option value="HOT">Hot ☀️</option>
                        <option value="COLD">Cold ❄️</option>
                        <option value="MIXED">Mixed ☁️</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-full" onclick="generatePlan()">Generate Plan ✨</button>
            </div>
        `;
    }

    async function generatePlan() {
        renderLoadingScreen();
        try {
            const res = await fetch('/api/v1/generate-travel-plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tripContext)
            });
            currentPlan = await res.json();
            renderPlanScreen();
        } catch (e) {
            alert("Failed to generate plan");
            renderIntroScreen();
        }
    }

    function renderLoadingScreen() {
        document.getElementById("screen").innerHTML = `
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Preparing your personalized family travel plan...</p>
            </div>
        `;
    }

    function renderPlanScreen() {
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="plan-view">
                <div class="plan-header">
                    <h2>Your Travel Plan 🎒</h2>
                    <button class="btn btn-secondary" onclick="savePlan()">Share Plan 🔗</button>
                </div>

                <div class="plan-section">
                    <h3>✅ Packing Checklist</h3>
                    <div class="plan-actions" style="margin-bottom: 10px;">
                        <button class="btn btn-secondary btn-sm" onclick="window.print()">Print Checklist 🖨️</button>
                    </div>
                    ${currentPlan.packingChecklist.map(cat => `
                        <div class="checklist-cat">
                            <h4>${cat.categoryName}</h4>
                            <ul>
                                ${cat.items.map(item => `<li><input type="checkbox"> ${item}</li>`).join('')}
                            </ul>
                        </div>
                    `).join('')}
                </div>

                <div class="plan-section pro-tips">
                    <h3>💡 Travel Preparation Tips</h3>
                    <ul>
                        ${currentPlan.travelTips.map(tip => `<li>${tip}</li>`).join('')}
                    </ul>
                </div>

                <div class="plan-section reminders">
                    <h3>⚠️ Don't Forget</h3>
                    <ul>
                        ${currentPlan.forgottenItems.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
                    
                ${currentPlan.travelResources && currentPlan.travelResources.length > 0 ? `
                <div class="plan-section resources">
                    <h3>🌍 Useful Resources</h3>
                    <div class="resource-list">
                        ${currentPlan.travelResources.map(r => `
                            <div class="resource-item" style="margin-bottom: 10px; padding: 10px; border: 1px solid #eee; border-radius: 8px;">
                                <strong>${r.type}: ${r.name}</strong><br>
                                <small>${r.description}</small><br>
                                <a href="${r.link}" target="_blank" style="color: var(--primary); text-decoration: none;">Explore →</a>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ` : ''}

                <div class="plan-section products">
                    <h3>🛒 Recommended Gear</h3>
                    <div class="product-grid">
                        ${currentPlan.recommendedProducts.map(p => `
                            <div class="product-card">
                                <img src="${p.image}" onerror="this.src='/logo.png'">
                                <h5>${p.name}</h5>
                                <p>${p.why || ''}</p>
                                <a href="${p.link}" target="_blank" class="btn btn-primary btn-sm">View</a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    }

    async function savePlan() {
        const res = await fetch('/api/v1/save-plan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(currentPlan)
        });
        const data = await res.json();
        const url = window.location.origin + '/plan-view.html?id=' + data.id;
        prompt("Copy this link to share your plan:", url);
    }

    function escapeHtml(text) {
        if (!text) return "";
        return text
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function renderIntroScreen() {
        const screen = document.getElementById("screen");

        screen.innerHTML = `
        <div class="hero">

            <div class="eyebrow">
                Smart product lists
            </div>

            <h1 class="hero-title">
                Smart lists for real mom life 💛
            </h1>

            <p class="hero-subtitle">
                Choose a category and describe what you need
            </p>

            <div class="category-label">
                Choose a category
            </div>

            <div class="category-grid">
                <button type="button" class="category-btn" onclick="selectCategory('travel', this)">
                    Travel ✈️
                </button>

                <button type="button" class="category-btn" onclick="selectCategory('play', this)">
                    Play 🧸
                </button>

                <button type="button" class="category-btn" onclick="selectCategory('outdoor', this)">
                    Outdoor 🌿
                </button>

                <button type="button" class="category-btn" onclick="selectCategory('feeding', this)">
                    Feeding 🍼
                </button>

                <button type="button" class="category-btn" onclick="selectCategory('bath', this)">
                    Bath 🛁
                </button>
            </div>

            <input
                id="userInput"
                class="input"
                type="text"
                placeholder="Try: flight with toddler..."
                autocomplete="off"
            />

            <button
                id="buildBtn"
                class="btn btn-primary btn-full"
                onclick="startFlow()"
            >
                Build my list ✨
            </button>

        </div>
    `;

        const input = document.getElementById("userInput");

        if (input) {
            input.focus();

            input.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    startFlow();
                }
            });
        }
    }

    function setLoadingState(loading) {
        isLoading = loading;

        const button = document.getElementById("buildBtn");
        const input = document.getElementById("userInput");

        if (button) {
            button.disabled = loading;
            button.style.opacity = loading ? "0.7" : "1";
            button.style.cursor = loading ? "wait" : "pointer";
        }

        if (input) {
            input.disabled = loading;
        }
    }

    async function startFlow() {
        if (isLoading) return;

        const inputEl = document.getElementById("userInput");
        if (!inputEl) return;

        const input = inputEl.value.trim();

        if (!selectedCategory) {
            alert("Please choose a category first 😊");
            return;
        }

        if (!input) {
            alert("Please tell me what you need 😊");
            return;
        }

        userInputText = input;
        setLoadingState(true);

        const screen = document.getElementById("screen");

        screen.innerHTML = `
        <div class="loading-wrap">
            <div class="spinner"></div>
            <h2>Building your list… ✨</h2>
            <p class="subtitle">Looking for the best matches in your product bank</p>
        </div>
    `;

        try {
            const response = await fetch("/ai-generate-list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    input: input,
                    category: selectedCategory
                })
            });

            if (!response.ok) {
                throw new Error("Request failed");
            }

            const data = await response.json();
            currentProducts = data.products || [];

            renderResultsScreen(data);

        } catch (error) {
            console.error(error);

            screen.innerHTML = `
            <div class="results-header">
                <div class="eyebrow">Something went wrong</div>
                <h2 class="results-title">Couldn’t build the list</h2>
                <p class="results-subtitle">
                    Please try again in a second.
                </p>
            </div>

            <div class="footer-actions">
                <button class="btn btn-secondary" onclick="renderIntroScreen()">
                    Back
                </button>
                <button class="btn btn-primary" onclick="renderIntroScreen()">
                    Try again
                </button>
            </div>
        `;
        } finally {
            setLoadingState(false);
        }
    }

    function renderResultsScreen(data) {
        const screen = document.getElementById("screen");
        const safeInput = escapeHtml(userInputText);

        const productsHtml = (data.products || []).map(p => `
        <div class="product-card">
            <div class="product-card-image-wrap">
                <img class="product-card-image" src="${p.image}" alt="${escapeHtml(p.name)}" />
            </div>

            <div class="product-card-body">
                <div class="product-card-title">${escapeHtml(p.name)}</div>

                <div class="product-card-footer">
                    <a href="${p.link}" target="_blank" class="product-link" rel="noopener noreferrer">
                        See product →
                    </a>
                </div>
            </div>
        </div>
    `).join("");

        screen.innerHTML = `
        <div class="results-header results-header-clean">
            <h2 class="results-title">A list just for you 💛</h2>
        </div>

        <div class="products-grid">
            ${productsHtml || `<div class="empty-state">No products found for this request yet.</div>`}
        </div>

        <div class="footer-actions">
            <button class="btn btn-secondary" onclick="renderIntroScreen()">
                Start over
            </button>

            <button class="btn btn-primary" onclick="shareList()" ${currentProducts.length === 0 ? 'disabled style="opacity:.65;cursor:not-allowed;"' : ''}>
                Save / Share 💛
            </button>
        </div>
    `;
    }

    async function shareList() {
        if (!currentProducts.length) {
            return;
        }

        try {
            const response = await fetch("/save-list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    input: userInputText,
                    products: currentProducts
                })
            });

            if (!response.ok) {
                throw new Error("Save failed");
            }

            const data = await response.json();
            const shareUrl = `${window.location.origin}/list-view.html?id=${data.id}`;

            if (navigator.share) {
                await navigator.share({
                    title: "My JUJE list",
                    text: "Check out this list I built",
                    url: shareUrl
                });
            } else {
                window.prompt("Copy your link:", shareUrl);
            }

        } catch (error) {
            console.error(error);
            alert("Something went wrong while saving");
        }
    }

    renderIntroScreen();

    function selectCategory(category, buttonEl) {
        selectedCategory = category;

        document.querySelectorAll(".category-btn").forEach(btn => {
            btn.classList.remove("category-btn-active");
        });

        buttonEl.classList.add("category-btn-active");
    }

</script>

</body>
</html>
