<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JUJE</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="app-shell">
    <div class="app-card">

        <div class="top-bar">
            <div class="brand">
                <img src="/logo.png" alt="JUJE logo"
                     onerror="this.style.display='none'; document.getElementById('fallbackBrand').style.display='block';" />
                <div id="fallbackBrand" class="brand-text" style="display:none;">JUJE</div>
            </div>

            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="screen" id="screen"></div>

    </div>
</div>

<script>
    let userInputText = "";
    let currentProducts = [];

    function updateProgress(value) {
        document.getElementById("progressBar").style.width = value + "%";
    }

    function renderIntroScreen() {
        updateProgress(0);

        const screen = document.getElementById("screen");

        screen.innerHTML = `
            <div class="hero">
                <h1 class="hero-title">
                    Smart lists for real mom life 💛
                </h1>

                <p class="hero-subtitle">
                    Tell me what you need — I’ll build you a smart list in seconds.
                </p>

                <input
                    id="userInput"
                    class="input"
                    type="text"
                    placeholder="Try: beach day with toddler, flight with baby..."
                />

                <button class="btn btn-primary btn-full" onclick="startFlow()">
                    Build my list ✨
                </button>
            </div>
        `;
    }

    async function startFlow() {
        const inputEl = document.getElementById("userInput");
        const input = inputEl.value.trim();

        if (!input) {
            alert("Please tell me what you need 😊");
            return;
        }

        userInputText = input;

        const screen = document.getElementById("screen");

        screen.innerHTML = `
            <div class="loading-wrap">
                <div class="spinner"></div>
                <h2>Building your list… ✨</h2>
                <p class="subtitle">Just a second while I find the best matches</p>
            </div>
        `;

        updateProgress(60);

        try {
            const response = await fetch("/ai-generate-list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    input: input
                })
            });

            const data = await response.json();

            currentProducts = data.products || [];

            renderResultsScreen(data);

        } catch (error) {
            console.error(error);
            screen.innerHTML = `
                <div class="empty-state">
                    Something went wrong
                </div>
            `;
        }
    }

    function renderResultsScreen(data) {
        const screen = document.getElementById("screen");
        updateProgress(100);

        const statusText = {
            good: "Perfect match 💛",
            partial: "Almost there ✨",
            missing: "Still building this 💭"
        };

        const productsHtml = (data.products || []).map(p => `
            <div class="product-item">

                <div class="product-left">
                    <div class="check-icon">✔</div>
                </div>

                <div class="product-content">
                    <div class="product-title">${p.name}</div>
                    <div class="product-why">${p.why}</div>

                    <a href="${p.link}" target="_blank" class="product-link">
                        See product →
                    </a>
                </div>

                <div class="product-image">
                    <img src="${p.image}" />
                </div>

            </div>
        `).join("");

        screen.innerHTML = `
            <div class="results-header">
                <div class="eyebrow">${statusText[data.status] || ""}</div>

                <h2 class="results-title">
                    Your JUJE list ✨
                </h2>

                <p class="results-subtitle">
                    ${data.message}
                </p>
            </div>

            ${productsHtml || `<div class="empty-state">No products found</div>`}

            <div class="footer-actions">
                <button class="btn btn-secondary" onclick="renderIntroScreen()">
                    Start over
                </button>

                <button class="btn btn-primary" onclick="shareList()">
                    Save / Share 💛
                </button>
            </div>
        `;
    }

    async function shareList() {
        try {
            const response = await fetch("/save-list", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    input: userInputText,
                    products: currentProducts
                })
            });

            const data = await response.json();
            const shareUrl = `${window.location.origin}/list-view.html?id=${data.id}`;

            if (navigator.share) {
                await navigator.share({
                    title: "My JUJE list",
                    text: "Check out this list I built",
                    url: shareUrl
                });
            } else {
                window.prompt("Copy your link:", shareUrl);
            }

        } catch (error) {
            console.error(error);
            alert("Something went wrong while saving");
        }
    }

    renderIntroScreen();
</script>

</body>
</html>
