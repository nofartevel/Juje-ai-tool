<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JUJE</title>

    <link rel="stylesheet" href="/styles.css">

    <!-- Open Graph -->
    <meta property="og:title" content="Traveling with kids? We've got you covered ✈️">
    <meta property="og:description" content="Get a personalized packing list, travel tips, and reminders in minutes ✨">
    <meta property="og:image" content="https://juje-smart-lists.up.railway.app/preview.png">
    <meta property="og:url" content="https://juje-smart-lists.up.railway.app">
    <meta property="og:type" content="website">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Traveling with kids? We've got you covered ✈️">
    <meta name="twitter:description" content="Get a personalized packing list, travel tips, and reminders in minutes ✨">
    <meta name="twitter:image" content="https://juje-smart-lists.up.railway.app/preview.png">
</head>
<body>

<div class="app-shell">
    <div class="app-card">

        <div class="top-bar">
            <div class="brand">
                <img src="/logo.png" alt="JUJE logo" class="logo"
                     onerror="this.style.display='none'; document.getElementById('fallbackBrand').style.display='block';" />
                <div id="fallbackBrand" class="brand-text" style="display:none;">JUJE</div>
            </div>
            <div id="stepIndicator" class="step-indicator"></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="screen" id="screen"></div>

    </div>
</div>

<script>
    let tripContext = {
        tripType: null,
        children: [],
        durationDays: 7,
        weather: "HOT"
    };
    let currentPlan = null;

    let childUnits = []; // Track unit per child: 'months' or 'years'

    function updateHeader(step, total, label) {
        const indicator = document.getElementById("stepIndicator");
        const fill = document.getElementById("progressFill");
        if (step === 0) {
            indicator.innerText = "";
            fill.style.width = "0%";
        } else {
            indicator.innerText = `${label} • Step ${step} of ${total}`;
            fill.style.width = `${(step / total) * 100}%`;
        }
    }

    function renderIntroScreen() {
        updateHeader(0, 3, "");
        if (typeof renderTripTypeStep === 'function') {
            renderTripTypeStep();
        } else {
            console.error("renderTripTypeStep not found");
        }
    }

    function renderTripTypeStep() {
        updateHeader(1, 3, "Trip Type");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="hero">
                <h1 class="hero-title">Traveling with kids? We've got you covered ✈️</h1>
                <p class="hero-subtitle">Get a personalized packing list, travel tips, reminders and product recommendations in minutes.</p>
                
                <div class="value-props-list">
                    <div class="v-prop-row">✅ Personalized packing checklist</div>
                    <div class="v-prop-row">✅ Travel tips by child age</div>
                    <div class="v-prop-row">✅ Things parents often forget</div>
                    <div class="v-prop-row">✅ Gear recommendations</div>
                </div>

                <div class="category-grid">
                    <div class="trip-card" onclick="setTripType('FLIGHT')">
                        <span class="trip-icon">✈️</span>
                        <span class="trip-label">Flight</span>
                    </div>
                    <div class="trip-card" onclick="setTripType('ROAD_TRIP')">
                        <span class="trip-icon">🚗</span>
                        <span class="trip-label">Road Trip</span>
                    </div>
                    <div class="trip-card" onclick="setTripType('BEACH')">
                        <span class="trip-icon">🏖️</span>
                        <span class="trip-label">Beach</span>
                    </div>
                    <div class="trip-card" onclick="setTripType('CRUISE')">
                        <span class="trip-icon">🚢</span>
                        <span class="trip-label">Cruise</span>
                    </div>
                    <div class="trip-card" onclick="setTripType('CAMPING')">
                        <span class="trip-icon">🏕️</span>
                        <span class="trip-label">Camping</span>
                    </div>
                    <div class="trip-card" onclick="setTripType('GENERAL')">
                        <span class="trip-icon">🌍</span>
                        <span class="trip-label">General</span>
                    </div>
                </div>
            </div>
        `;
    }

    function setTripType(type) {
        tripContext.tripType = type;
        renderFamilyStep();
    }

    function renderFamilyStep() {
        updateHeader(2, 3, "Family");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="nav-controls">
                <button class="btn-back" onclick="renderTripTypeStep()">← Back</button>
            </div>
            <div class="hero">
                <h1 class="hero-title">Family Details 👨‍👩‍👧‍👦</h1>
                <p class="hero-subtitle">Add your children and their ages</p>
                <div id="childrenList" class="children-list"></div>
                <button class="btn btn-secondary" onclick="addChild()">+ Add Child</button>
                <br><br>
                <button class="btn btn-primary btn-full" onclick="renderLogisticsStep()">Next Step</button>
            </div>
        `;
        updateChildrenList();
    }

    function addChild() {
        // Default new child with no age set (undefined or null) and 'years' unit
        tripContext.children.push({ ageMonths: undefined });
        childUnits.push('years');
        updateChildrenList();
    }

    function updateChildrenList() {
        const list = document.getElementById("childrenList");
        list.innerHTML = tripContext.children.map((c, i) => {
            const hasAge = c.ageMonths !== undefined && c.ageMonths !== null;
            const unit = childUnits[i] || 'years';
            
            // For display, if unit is years, we show ageMonths/12, otherwise ageMonths
            let displayValue = "";
            if (hasAge) {
                displayValue = (unit === 'years') ? Math.floor(c.ageMonths / 12) : c.ageMonths;
            }

            return `
                <div class="child-card">
                    <div class="child-card-header">
                        <span class="child-label">Child ${i+1}</span>
                        <button class="btn-icon" onclick="removeChildAtIndex(${i})">🗑️</button>
                    </div>
                    <div class="age-input-container">
                        <input type="number" 
                               inputmode="numeric"
                               pattern="[0-9]*"
                               class="age-input" 
                               value="${displayValue || ''}" 
                               oninput="updateChildAge(${i}, this.value)"
                               placeholder="Age">
                    </div>
                    <div class="segmented-control">
                        <div class="segmented-option ${unit === 'months' ? 'active' : ''}" onclick="setChildUnit(${i}, 'months')">Months</div>
                        <div class="segmented-option ${unit === 'years' ? 'active' : ''}" onclick="setChildUnit(${i}, 'years')">Years</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function setChildUnit(i, unit) {
        const currentVal = tripContext.children[i].ageMonths;
        const currentUnit = childUnits[i];
        
        if (currentUnit === unit) return;
        
        childUnits[i] = unit;
        
        // If there was a value, we might want to preserve it or just re-render
        // The instructions say "Tapping Months switches the unit". 
        // We need to make sure the value in the input is re-interpreted correctly.
        // Actually, updateChildrenList will re-render with the correct displayValue.
        updateChildrenList();
    }

    function updateChildAge(i, val) {
        let valInt = parseInt(val);
        if (isNaN(valInt)) {
            tripContext.children[i].ageMonths = undefined;
            return;
        }
        const unit = childUnits[i];
        let ageMonths = valInt;
        if (unit === 'years') {
            ageMonths = valInt * 12;
        }
        tripContext.children[i].ageMonths = ageMonths;
    }
    function removeChildAtIndex(i) { 
        tripContext.children.splice(i, 1); 
        childUnits.splice(i, 1);
        updateChildrenList(); 
    }

    function renderLogisticsStep() {
        updateHeader(3, 3, "Details");
        const screen = document.getElementById("screen");
        screen.innerHTML = `
            <div class="nav-controls">
                <button class="btn-back" onclick="renderFamilyStep()">← Back</button>
            </div>
            <div class="hero">
                <h1 class="hero-title">Trip Details 🗓️</h1>
                <p class="hero-subtitle">Let's personalize your travel plan ✨</p>
                <div class="input-group">
                    <label>Duration (days):</label>
                    <div class="duration-input-wrapper">
                        <input type="number" 
                               value="${tripContext.durationDays}" 
                               onchange="tripContext.durationDays = parseInt(this.value)" 
                               class="duration-field" 
                               inputmode="numeric" 
                               pattern="[0-9]*">
                        <span class="duration-unit">Days</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Expected Weather:</label>
                    <div class="weather-grid">
                        <div class="weather-card ${tripContext.weather === 'HOT' ? 'active' : ''}" onclick="setWeather('HOT')">
                            <span class="weather-icon">☀️</span>
                            <span class="weather-label">Hot</span>
                        </div>
                        <div class="weather-card ${tripContext.weather === 'MIXED' ? 'active' : ''}" onclick="setWeather('MIXED')">
                            <span class="weather-icon">🌤️</span>
                            <span class="weather-label">Mixed</span>
                        </div>
                        <div class="weather-card ${tripContext.weather === 'COLD' ? 'active' : ''}" onclick="setWeather('COLD')">
                            <span class="weather-icon">❄️</span>
                            <span class="weather-label">Cold</span>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary btn-full" onclick="generatePlan()">Generate Plan ✨</button>
            </div>
        `;
    }

    function setWeather(weather) {
        tripContext.weather = weather;
        renderLogisticsStep();
    }

    async function generatePlan() {
        // Validation
        if (tripContext.children.length === 0) {
            alert("Please add at least one child.");
            renderFamilyStep();
            return;
        }
        const invalidChild = tripContext.children.some(c => c.ageMonths === undefined || c.ageMonths === null);
        if (invalidChild) {
            alert("Please enter the age for all children.");
            renderFamilyStep();
            return;
        }

        const startTime = performance.now();
        renderLoadingScreen();
        try {
            const res = await fetch('/api/v1/generate-travel-plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tripContext)
            });
            const fetchEndTime = performance.now();
            console.log(`[PERF] Frontend Fetch: ${Math.round(fetchEndTime - startTime)}ms`);
            console.log("Response from server:", res);

            const data = await res.json();
            console.log("Parsed data:", data);
            
            if (!res.ok) {
                alert(data.message || "Failed to generate plan");
                renderIntroScreen();
                return;
            }

            currentPlan = data;
            const parseEndTime = performance.now();
            console.log(`[PERF] Frontend JSON Parse: ${Math.round(parseEndTime - fetchEndTime)}ms`);

            renderPlanScreen();
            const renderEndTime = performance.now();
            console.log(`[PERF] Frontend Render: ${Math.round(renderEndTime - parseEndTime)}ms`);
            console.log(`[PERF] Total Frontend Time: ${Math.round(renderEndTime - startTime)}ms`);
        } catch (e) {
            console.error("Generation error:", e);
            alert("An error occurred: " + e.message);
            renderIntroScreen();
        }
    }

    function renderLoadingScreen() {
        const iconMap = {
            'FLIGHT': '✈️',
            'ROAD_TRIP': '🚗',
            'BEACH': '🏖️',
            'CRUISE': '🚢',
            'CAMPING': '⛺',
            'GENERAL': '🌍'
        };
        const icon = iconMap[tripContext.tripType] || '✨';
        const loadingMessages = [
            "Building your personalized family travel plan...",
            "Creating your packing checklist...",
            "Finding the best tips and gear..."
        ];
        let msgIndex = 0;

        document.getElementById("screen").innerHTML = `
            <div class="loading-state" style="text-align: center; padding: 60px 20px;">
                <div class="travel-animation" style="font-size: 50px; margin-bottom: 30px; animation: travelAnimation 2s ease-in-out infinite;">
                    ${icon}
                </div>
                <h3 id="loading-msg" style="color: var(--primary); font-weight: 700;">${loadingMessages[0]}</h3>
                <p style="color: var(--muted); margin-top: 10px;">This may take a moment</p>
            </div>
        `;

        const msgInterval = setInterval(() => {
            msgIndex = (msgIndex + 1) % loadingMessages.length;
            const msgEl = document.getElementById("loading-msg");
            if (msgEl) {
                msgEl.innerText = loadingMessages[msgIndex];
            } else {
                clearInterval(msgInterval);
            }
        }, 3000);
    }

    function renderPlanScreen() {
        updateHeader(0, 3, ""); // Reset header for results
        console.log("currentPlan received from backend:", currentPlan);
        
        const screen = document.getElementById("screen");
        const forgottenItems = currentPlan.forgottenItems || [];
        const products = currentPlan.recommendedProducts || [];
        const tips = currentPlan.travelTips || [];
        const checklist = currentPlan.packingChecklist || [];
        const resources = currentPlan.travelResources || [];

        // Group products by category
        const categorizedProducts = {};
        products.forEach(p => {
            const cat = p.activity_type || 'GENERAL';
            if (!categorizedProducts[cat]) categorizedProducts[cat] = [];
            categorizedProducts[cat].push(p);
        });

        const categoryIcons = {
            'TRAVEL': '✈️',
            'OUTDOOR': '☀️',
            'FEEDING': '🍽️',
            'PLAY': '🎨',
            'DIAPERING': '🧼',
            'BATH': '🛁',
            'GENERAL': '⭐'
        };

        const categoryNames = {
            'TRAVEL': 'Travel Essentials',
            'OUTDOOR': 'Outdoor & Beach',
            'FEEDING': 'Feeding',
            'PLAY': 'Entertainment',
            'DIAPERING': 'Diapering & Care',
            'BATH': 'Bath Time',
            'GENERAL': 'Top Recommendations'
        };

        screen.innerHTML = `
            <div class="result-container" style="animation: fadeInUp 0.5s ease;">
                <div class="result-header" style="text-align: center; margin-bottom: 30px;">
                    <h2 style="font-weight: 800; color: var(--primary);">Your Travel Plan</h2>
                    <p style="color: var(--text-light);">Customized for your family trip</p>
                    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                        <button class="btn btn-primary" onclick="window.print()">Print Checklist</button>
                        <button class="btn btn-secondary" onclick="savePlan()">Share Plan</button>
                    </div>
                </div>

                <div class="result-dashboard">
                    <!-- 1. Packing Checklist (Collapsed by default) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('checklist-content', 'checklist-icon')">
                            <h3><span>📦</span> Packing Checklist</h3>
                            <span id="checklist-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                        </div>
                        <div id="checklist-content" class="section-content" style="display: none;">
                            <div class="accordion">
                                ${checklist.map((cat, i) => `
                                    <div class="accordion-item" style="border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden;">
                                        <div class="accordion-header" onclick="toggleAccordion(${i})" style="background: white; padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700;">
                                            <span style="font-size: 15px;">${cat.categoryName} <span style="font-weight: 400; color: var(--muted); font-size: 13px; margin-left: 5px;">(${cat.items ? cat.items.length : 0} items)</span></span>
                                            <span id="acc-icon-${i}" style="color: var(--primary); font-size: 12px;">▼</span>
                                        </div>
                                        <div id="acc-content-${i}" class="accordion-content" style="display: none; padding: 15px 20px; background: white; border-top: 1px solid var(--border);">
                                            <ul style="list-style: none; padding: 0; margin: 0;">
                                                ${(cat.items || []).map(item => `<li style="margin-bottom: 12px; display: flex; align-items: flex-start; font-size: 14px; line-height: 1.4;"><input type="checkbox" style="margin-right: 12px; margin-top: 3px; accent-color: var(--primary); width: 18px; height: 18px; flex-shrink: 0;"> <span>${item}</span></li>`).join('')}
                                            </ul>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- 2. Products / Gear (Collapsed by default, grouped by categories) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('gear-content', 'gear-icon')">
                            <h3><span>🛒</span> Recommended Gear</h3>
                            <span id="gear-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                        </div>
                        <div id="gear-content" class="section-content" style="display: none;">
                            ${Object.keys(categorizedProducts).length > 0 ? Object.keys(categorizedProducts).map((catKey, idx) => `
                                <div class="category-collapsible">
                                    <div class="category-header" onclick="toggleSection('prod-cat-${idx}', 'prod-cat-icon-${idx}')">
                                        <span>${categoryIcons[catKey.toUpperCase()] || '⭐'} ${categoryNames[catKey.toUpperCase()] || catKey} (${categorizedProducts[catKey].length})</span>
                                        <span id="prod-cat-icon-${idx}" style="font-size: 10px;">▼</span>
                                    </div>
                                    <div id="prod-cat-${idx}" class="category-content" style="display: none;">
                                        ${categorizedProducts[catKey].map(p => {
                                            const tags = [];
                                            if (p.activity_type) tags.push(p.activity_type.replace(/_/g, ' '));
                                            if (p.age_groups) tags.push(p.age_groups);
                                            
                                            return `
                                                <a href="${p.link}" target="_blank" class="product-row">
                                                    <img src="${p.image}" onerror="this.src='/logo.png'" class="product-row-thumb">
                                                    <div class="product-row-info">
                                                        <h5 class="product-row-name">${p.name}</h5>
                                                        <p class="product-row-desc">${p.why || ''}</p>
                                                        <div class="product-metadata">
                                                            ${tags.map(t => `<span class="tag-mini">${t}</span>`).join('')}
                                                        </div>
                                                        <div class="product-row-cta">
                                                            See Product →
                                                        </div>
                                                    </div>
                                                </a>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `).join('') : `
                                <div style="text-align: center; padding: 40px 20px; color: var(--muted);">
                                    <p>No products returned for this trip context.</p>
                                </div>
                            `}
                        </div>
                    </div>

                    <!-- 3. Travel Tips (Collapsed by default) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('tips-content', 'tips-icon')">
                            <h3><span>💡</span> Travel Tips</h3>
                            <span id="tips-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                        </div>
                        <div id="tips-content" class="section-content" style="display: none;">
                            <div class="tips-grid" style="display: grid; grid-template-columns: 1fr; gap: 15px;">
                                ${tips.map(tip => `
                                    <div style="background: var(--bg-soft); padding: 18px; border-radius: 16px; border-left: 5px solid var(--primary); line-height: 1.6; font-size: 15px;">
                                        ${tip}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- 4. Things Parents Forget (Collapsed by default) -->
                    <div class="section-collapsible">
                        <div class="section-header" onclick="toggleSection('reminders-content', 'reminders-icon')">
                            <h3><span>⚠️</span> Things Parents Forget</h3>
                            <span id="reminders-icon" style="color: var(--primary); font-size: 12px;">▼</span>
                        </div>
                        <div id="reminders-content" class="section-content" style="display: none;">
                            <ul style="list-style: none; padding: 0; margin: 0;">
                                ${forgottenItems.map(item => `<li style="margin-bottom: 12px; display: flex; align-items: flex-start; line-height: 1.5;">
                                    <span style="color: #d9534f; margin-right: 12px; font-weight: bold;">•</span>
                                    <span style="font-size: 15px;">${item}</span>
                                </li>`).join('')}
                            </ul>
                        </div>
                    </div>

                    ${resources && resources.length > 0 ? `
                    <div class="dashboard-card resources">
                        <h3><span>🌍</span> Useful Resources</h3>
                        <div class="resource-list">
                            ${resources.map(r => `
                                <div class="resource-item" style="margin-bottom: 10px; padding: 15px; background: var(--bg-soft); border-radius: 12px;">
                                    <strong>${r.type}: ${r.name}</strong><br>
                                    <small>${r.description}</small><br>
                                    <a href="${r.link}" target="_blank" style="color: var(--primary); text-decoration: none; font-weight: 700; display: inline-block; margin-top: 8px;">Explore →</a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>

                <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
                    <button class="btn btn-secondary" onclick="renderIntroScreen()">Start New Plan</button>
                </div>
            </div>
        `;
    }

    function toggleSection(contentId, iconId) {
        const content = document.getElementById(contentId);
        const icon = document.getElementById(iconId);
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.innerText = "▲";
        } else {
            content.style.display = "none";
            icon.innerText = "▼";
        }
    }

    function toggleAccordion(i) {
        const content = document.getElementById(`acc-content-${i}`);
        const icon = document.getElementById(`acc-icon-${i}`);
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.innerText = "▲";
        } else {
            content.style.display = "none";
            icon.innerText = "▼";
        }
    }

    async function savePlan() {
        try {
            const res = await fetch('/api/v1/save-plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(currentPlan)
            });

            if (!res.ok) {
                throw new Error("Failed to save plan");
            }

            const data = await res.json();
            const shareUrl = window.location.origin + '/plan-view.html?id=' + data.id;

            if (navigator.share) {
                await navigator.share({
                    title: "My JUJE Family Travel Plan",
                    text: "Here’s a family travel plan with packing checklist, tips and gear recommendations 💛",
                    url: shareUrl
                });
            } else {
                window.prompt("Copy this link to share your plan:", shareUrl);
            }

        } catch (error) {
            console.error(error);
            alert("Something went wrong while saving or sharing the plan.");
        }
    }


    renderIntroScreen();

</script>

</body>
</html>
